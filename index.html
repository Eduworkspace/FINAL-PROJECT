<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduVoyage Operations Workspace</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --navy:#16365F;--navy-dark:#0F2544;--navy-card:#EBF0F7;--navy-line:#CBD5E1;
    --gold:#C8A24B;--gold-soft:#8B5E0A;--white:#FFFFFF;--bg:#EEF2F7;
    --text:#1E3A5F;--muted:#64748B;--danger:#B91C3A;--ok:#166534;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;}
  h1,h2,h3{font-weight:600;color:var(--navy)}
  a{color:var(--navy);text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none}
  input,select,textarea{font-family:inherit}

  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg)}
  .login-card{width:100%;max-width:400px;background:var(--white);border:1px solid var(--navy-line);border-radius:16px;padding:40px 36px;box-shadow:0 4px 24px rgba(22,54,95,.10)}
  .brand{display:flex;flex-direction:column;align-items:center;margin-bottom:28px}
  .brand .mark{width:56px;height:56px;border-radius:14px;background:var(--navy);color:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:22px;margin-bottom:14px;letter-spacing:.5px}
  .brand h1{font-size:19px;letter-spacing:.3px;color:var(--navy)}
  .brand .tag{color:var(--muted);font-size:12px;margin-top:5px;text-align:center}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:500}
  .field input,.field select,.field textarea{width:100%;background:var(--white);border:1.5px solid var(--navy-line);color:var(--text);padding:11px 12px;border-radius:8px;font-size:14px}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--navy)}
  .btn{background:var(--navy);color:var(--white);font-weight:600;padding:11px 16px;border-radius:8px;font-size:14px;transition:background .15s}
  .btn:hover{background:var(--navy-dark)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn-block{width:100%;margin-top:6px}
  .btn-ghost{background:var(--white);color:var(--navy);border:1.5px solid var(--navy-line)}
  .btn-ghost:hover{border-color:var(--navy);background:var(--bg)}
  .btn-danger{background:var(--danger);color:#fff}
  .btn-danger:hover{filter:brightness(1.1)}
  .btn-sm{padding:6px 11px;font-size:12px;border-radius:6px}
  .login-err{color:var(--danger);font-size:12.5px;margin-top:10px;min-height:16px;text-align:center}
  .hint{color:var(--muted);font-size:11.5px;text-align:center;margin-top:18px;line-height:1.7}
  .setup-box{font-size:12.5px;color:var(--text);line-height:1.7;background:var(--bg);border:1px solid var(--navy-line);border-radius:8px;padding:16px;margin-top:6px}
  .setup-box code{background:var(--navy);color:var(--gold);padding:1px 5px;border-radius:4px;font-size:11.5px}

  #app{display:none;min-height:100vh}
  .shell{display:flex;min-height:100vh}
  .sidebar{width:248px;flex-shrink:0;background:var(--navy);border-right:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:40}
  .sidebar-head{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:11px}
  .sidebar-head .mark{width:38px;height:38px;border-radius:9px;background:var(--gold);color:var(--white);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0}
  .sidebar-head .name{font-size:14px;font-weight:600;color:#FFFFFF;line-height:1.2}
  .sidebar-head .sub{font-size:10.5px;color:rgba(255,255,255,.5);margin-top:2px}
  .nav{flex:1;overflow-y:auto;padding:12px 10px}
  .nav-item{display:block;width:100%;text-align:left;background:transparent;color:rgba(255,255,255,.6);padding:10px 13px;border-radius:8px;font-size:13.5px;margin-bottom:2px;transition:all .12s}
  .nav-item:hover{background:rgba(255,255,255,.1);color:#FFFFFF}
  .nav-item.active{background:var(--gold);color:var(--navy);font-weight:600}
  .nav-sep{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.35);padding:14px 13px 6px}
  .sidebar-foot{padding:14px 16px;border-top:1px solid rgba(255,255,255,.08)}
  .sidebar-foot .u-name{font-size:13px;color:#FFFFFF;font-weight:600}
  .sidebar-foot .u-role{font-size:11px;color:var(--gold);text-transform:capitalize;margin-bottom:10px}

  .main{flex:1;margin-left:248px;min-width:0;display:flex;flex-direction:column}
  .topbar{height:62px;border-bottom:1px solid var(--navy-line);background:var(--white);display:flex;align-items:center;justify-content:space-between;padding:0 26px;position:sticky;top:0;z-index:30}
  .topbar h2{font-size:17px;color:var(--navy)}
  .topbar .right{display:flex;align-items:center;gap:12px}
  .sync{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--muted)}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--ok)}
  .dot.off{background:var(--danger)}
  .hamburger{display:none;background:transparent;color:var(--text);font-size:20px;padding:6px 10px;border-radius:6px}
  .content{padding:26px;flex:1}

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
  .stat{background:var(--white);border:1px solid var(--navy-line);border-radius:12px;padding:18px;box-shadow:0 1px 4px rgba(22,54,95,.06)}
  .stat .label{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
  .stat .value{font-size:25px;font-weight:700;color:var(--navy);margin-top:8px}
  .stat .value.gold{color:var(--gold-soft)}

  .panel{background:var(--white);border:1px solid var(--navy-line);border-radius:12px;padding:20px;margin-bottom:20px;box-shadow:0 1px 4px rgba(22,54,95,.06)}
  .panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
  .panel-head h3{font-size:15px;color:var(--navy)}
  .panel-sub{font-size:12px;color:var(--muted);margin-top:3px}

  .table-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding:10px 12px;border-bottom:1.5px solid var(--navy-line);white-space:nowrap;background:var(--bg)}
  td{padding:11px 12px;border-bottom:1px solid var(--navy-line);color:var(--text);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tbody tr:hover{background:var(--navy-card)}
  .empty{text-align:center;color:var(--muted);padding:34px 10px;font-size:13px}
  .pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;background:#F1F5F9;color:var(--muted)}
  .pill.ok{background:#DCFCE7;color:#166534}
  .pill.warn{background:#FEF3C7;color:#92400E}
  .pill.muted{background:#F1F5F9;color:var(--muted)}
  .pill.danger{background:#FEE2E2;color:#991B1B}
  .section-label{font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--navy);border-left:3px solid var(--gold);padding-left:8px;margin:4px 0 12px}
  .row-actions{display:flex;gap:7px;white-space:nowrap;justify-content:flex-end}
  .icon-btn{background:var(--bg);color:var(--navy);border:1px solid var(--navy-line);padding:5px 10px;border-radius:6px;font-size:12px}
  .icon-btn:hover{border-color:var(--navy);background:var(--white)}
  .icon-btn.del:hover{border-color:var(--danger);color:var(--danger)}

  .overlay{display:none;position:fixed;inset:0;background:rgba(10,20,40,.55);z-index:100;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
  .overlay.show{display:flex}
  .modal{width:100%;max-width:480px;background:var(--white);border:1px solid var(--navy-line);border-radius:14px;padding:24px;box-shadow:0 8px 32px rgba(22,54,95,.12)}
  .modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
  .modal-head h3{font-size:16px;color:var(--navy)}
  .modal-close{background:transparent;color:var(--muted);font-size:20px;line-height:1;padding:2px 8px}
  .modal-close:hover{color:var(--navy)}
  .modal-foot{display:flex;gap:10px;justify-content:flex-end;margin-top:22px}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  .note{font-size:12px;color:var(--muted);background:var(--bg);border:1px solid var(--navy-line);border-radius:8px;padding:12px 14px;margin-bottom:14px;line-height:1.6}
  .kv{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--navy-line);font-size:13px}
  .kv:last-child{border:none}
  .kv .k{color:var(--muted)}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:var(--white);padding:11px 20px;border-radius:8px;font-weight:600;font-size:13px;z-index:200;opacity:0;transition:opacity .25s;pointer-events:none}
  .toast.show{opacity:1}

  @media(max-width:860px){
    .stats{grid-template-columns:repeat(2,1fr)}
    .grid2{grid-template-columns:1fr}
    .sidebar{transform:translateX(-100%);transition:transform .22s}
    .sidebar.open{transform:translateX(0)}
    .main{margin-left:0}
    .hamburger{display:block}
    .scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:35}
    .scrim.show{display:block}
  }
  @media(max-width:520px){
    .stats{grid-template-columns:1fr}
    .content{padding:16px}
    .topbar{padding:0 14px}
  }
</style>
</head>
<body>

<!-- ===================== LOGIN ===================== -->
<div id="login">
  <div class="login-card" id="loginCard">
    <div class="brand">
      <div class="mark">EV</div>
      <h1>EduVoyage Operations</h1>
      <div class="tag">Expert Guidance, Exceptional Journeys</div>
    </div>
    <div id="loginForm">
      <div class="field"><label>Password</label><input id="loginPass" type="password" autocomplete="current-password" placeholder="Enter your password"></div>
      <button class="btn btn-block" id="loginBtn" onclick="login()">Sign In</button>
      <div class="login-err" id="loginErr"></div>
      <div class="hint">EduVoyage private workspace &bull; cloud-synced</div>
    </div>
  </div>
</div>

<!-- ===================== APP ===================== -->
<div id="app">
  <div class="shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <div class="mark">EV</div>
        <div><div class="name">EduVoyage</div><div class="sub">Operations Workspace</div></div>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="sidebar-foot">
        <div class="u-name" id="uName">&mdash;</div>
        <div class="u-role" id="uRole">&mdash;</div>
        <button class="btn btn-ghost btn-block btn-sm" onclick="logout()">Log Out</button>
      </div>
    </aside>
    <div class="scrim" id="scrim" onclick="toggleSidebar(false)"></div>
    <div class="main">
      <div class="topbar">
        <div style="display:flex;align-items:center;gap:10px">
          <button class="hamburger" onclick="toggleSidebar(true)">&#9776;</button>
          <h2 id="pageTitle">Dashboard</h2>
        </div>
        <div class="right">
          <span class="sync"><span class="dot" id="syncDot"></span><span id="syncText">Live</span></span>
          <span style="font-size:12px;color:var(--muted)" id="topUser"></span>
        </div>
      </div>
      <div class="content" id="content"></div>
    </div>
  </div>
</div>

<!-- ===================== MODAL ===================== -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head"><h3 id="modalTitle">Add</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
    <div id="modalBody"></div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn" id="modalSave">Save</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ======================================================================
   EDUVOYAGE OPERATIONS WORKSPACE v3 — Supabase real-time backend
   ====================================================================== */

/* ---- 1. PASTE YOUR SUPABASE CREDENTIALS HERE ---- */
const SUPABASE_URL      = "https://qoluzahfjvgxsqpssatz.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable__KpMdG9k3Z2aXbS39JaoGg_WB-okR89";

/* Username -> email mapping (must match the two users you create in Supabase) */
const ADMIN_EMAIL = "admin@eduvoyage.app";
const CE_EMAIL    = "ce@eduvoyage.app";
const SM_EMAIL    = "social@eduvoyage.app";

/* ---- internals ---- */
let sb = null;
let session = null;          // {name, role, email}
let current = "dashboard";
let rtChannel = null;
let rtTimer = null;

const ALL_TABLES = ["clients","attendance","social_media","ce_tasks","todos","ce_reports",
  "webinars","services","scholarships","revenue","expenses","personal_eduvoyage","personal_waka","activity_log",
  "weekly_duties","competitor_watch","social_performance","service_info"];
const HAS_CREATED_BY = new Set(["clients","social_media","todos","ce_reports"]);
const HAS_UPDATED_AT = new Set(["clients","social_media","ce_tasks","todos","ce_reports","webinars","services","scholarships","revenue","expenses","personal_eduvoyage","personal_waka",
  "weekly_duties","competitor_watch","social_performance","service_info"]);

/* ---------- helpers ---------- */
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }
function naira(n){ const v=Number(n)||0; return "\u20A6"+v.toLocaleString("en-NG",{maximumFractionDigits:2}); }
function nowStamp(ts){ const d=ts?new Date(ts):new Date(); return d.toLocaleString("en-GB",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"}); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),2200); }
function configured(){ return SUPABASE_URL.indexOf("PASTE_")<0 && SUPABASE_ANON_KEY.indexOf("PASTE_")<0; }

/* ---------- data access ---------- */
async function fetchTable(table, orderCol){
  const col = orderCol || (table==="activity_log" ? "timestamp" : "created_at");
  const { data, error } = await sb.from(table).select("*").order(col,{ascending:false});
  if(error){ throw error; }
  return data||[];
}
async function logActivity(action, module, details, recordId){
  try{
    await sb.from("activity_log").insert({
      user_name: session?session.name:"-", action, module,
      details: details||"", record_id: recordId||null,
      actor_role: session?session.role:null
    });
  }catch(e){ /* CE may lack read but can insert; never block main op */ }
}

/* ---------- auth ---------- */
function roleFromEmail(email){
  if(!email) return null;
  email = email.toLowerCase();
  if(email===ADMIN_EMAIL.toLowerCase()) return {role:"admin", name:"Aminat", email};
  if(email===CE_EMAIL.toLowerCase())    return {role:"ce", name:"Client Executive", email};
  if(email===SM_EMAIL.toLowerCase())    return {role:"sm", name:"Social Media Manager", email};
  return {role:"ce", name:email, email}; // unknown account treated as limited
}
async function login(){
  const p = document.getElementById("loginPass").value;
  const err = document.getElementById("loginErr");
  const btn = document.getElementById("loginBtn");
  const email = ADMIN_EMAIL;
  if(!p){ err.textContent="Enter your password."; return; }
  err.textContent="Signing in\u2026"; btn.disabled=true;
  try{
    const { data, error } = await sb.auth.signInWithPassword({ email, password:p });
    if(error){ err.textContent = friendlyAuthError(error.message); btn.disabled=false; return; }
    session = roleFromEmail(data.user.email);
    err.textContent="";
    await logActivity("sign in","auth", session.name+" logged in");
    subscribeRealtime();
    startApp();
  }catch(e){ err.textContent="Connection error: "+e.message; }
  btn.disabled=false;
}
function friendlyAuthError(m){
  if(/invalid login/i.test(m)) return "Invalid username or password.";
  if(/confirm/i.test(m)) return "This account is not confirmed yet. Enable Auto-Confirm in Supabase.";
  return m;
}
async function logout(){
  await logActivity("sign out","auth",(session?session.name:"")+" logged out");
  if(rtChannel){ try{ await sb.removeChannel(rtChannel); }catch(e){} rtChannel=null; }
  try{ await sb.auth.signOut(); }catch(e){}
  session=null;
  document.getElementById("app").style.display="none";
  document.getElementById("login").style.display="flex";
  
  document.getElementById("loginPass").value="";
}

/* ---------- realtime ---------- */
function subscribeRealtime(){
  if(rtChannel) return;
  rtChannel = sb.channel("eduvoyage-rt");
  ALL_TABLES.forEach(t=>{
    rtChannel.on("postgres_changes",{event:"*",schema:"public",table:t}, ()=>onRealtime(t));
  });
  rtChannel.subscribe(status=>{
    const dot=document.getElementById("syncDot"), txt=document.getElementById("syncText");
    if(!dot) return;
    if(status==="SUBSCRIBED"){ dot.classList.remove("off"); txt.textContent="Live"; }
    else if(status==="CHANNEL_ERROR"||status==="TIMED_OUT"){ dot.classList.add("off"); txt.textContent="Offline"; }
  });
}
function viewTables(key){
  if(key==="dashboard") return ["clients","revenue","todos","ce_tasks","activity_log"];
  if(key==="finances")  return ["revenue","expenses","clients"];
  if(key==="personal")  return ["personal_eduvoyage","personal_waka"];
  if(key==="activity")  return ["activity_log"];
  if(key==="attendance")return ["attendance"];
  if(key==="ceTasks")   return ["weekly_duties","ce_tasks","competitor_watch"];
  if(key==="social")    return ["social_media","social_performance"];
  if(CRUD[key])         return [CRUD[key].table];
  return [];
}
function onRealtime(table){
  if(viewTables(current).includes(table)){
    clearTimeout(rtTimer);
    rtTimer=setTimeout(()=>show(current),250);
  }
}

/* ---------- module registry ---------- */
const NAV = [
  { key:"dashboard",    label:"Dashboard",            group:"Overview" },
  { key:"attendance",   label:"Attendance",           group:"Overview" },
  { key:"clients",      label:"Client Work",          group:"Work" },
  { key:"webinars",     label:"Webinars",             group:"Work" },
  { key:"scholarships", label:"Scholarship Advisory", group:"Work" },
  { key:"services",     label:"Services & Info",      group:"Work" },
  { key:"finances",     label:"Finances",             group:"Work" },
  { key:"personal",     label:"Personal Workspace",   group:"Private" },
  { key:"activity",     label:"Activity Log",         group:"Private" },
  { key:"settings",     label:"Settings",             group:"System" }
];

const ST = {
  client:["In Progress","Submitted","Visa Approved","Visa Rejected","Visa Reapplied","On Hold","Completed"],
  social:["Draft","Scheduled","Published"],
  ceTask:["Pending","Done"],
  todo:["Pending","In Progress","Done"],
  scholarship:["Open","Applied","Closed"],
  webinar:["Upcoming","Done","Cancelled"],
  contentType:["Carousel","Flyer","Reel","Video","Talking-head Video","Meme"],
  brand:["Study Abroad","Travel & Tourism"]
};
const CE_OPTS = [{value:"ce",label:"Client Executive"},{value:"admin",label:"Admin (Aminat)"}];
const CE_MAP  = {ce:"Client Executive", admin:"Admin"};

const CRUD = {
  clients:{ table:"clients", title:"Client Work", addLabel:"Add Client",
    fields:[
      {k:"client_name",label:"Client Name",type:"text",req:true},
      {k:"phone",label:"Phone Number",type:"text"},
      {k:"invoice_no",label:"Invoice No",type:"text"},
      {k:"service",label:"Service",type:"text"},
      {k:"country",label:"Country",type:"text"},
      {k:"status",label:"Status",type:"select",opts:ST.client},
      {k:"last_followup",label:"Last Follow-Up",type:"date"},
      {k:"google_drive_link",label:"Google Drive Link",type:"text"},
      {k:"balance",label:"Balance (\u20A6)",type:"number"}
    ],
    cols:[
      {k:"invoice_no",label:"Inv#"},{k:"client_name",label:"Client"},{k:"phone",label:"Phone"},
      {k:"service",label:"Service"},{k:"country",label:"Country"},
      {k:"status",label:"Status",pill:true},{k:"last_followup",label:"Last Follow-Up"},
      {k:"google_drive_link",label:"Drive",link:true},{k:"balance",label:"Balance",money:true}
    ]},
  social:{ table:"social_media", title:"Social Media", addLabel:"Add Post",
    fields:[
      {k:"brand",label:"Brand",type:"select",opts:ST.brand},
      {k:"platform",label:"Platform",type:"select",opts:["Instagram","TikTok","Facebook"]},
      {k:"content_type",label:"Content Type",type:"select",opts:ST.contentType},
      {k:"topic",label:"Topic",type:"text",req:true},
      {k:"post_date",label:"Date",type:"date"},
      {k:"status",label:"Status",type:"select",opts:ST.social}
    ],
    cols:[{k:"brand",label:"Brand"},{k:"platform",label:"Platform"},{k:"content_type",label:"Type"},{k:"topic",label:"Topic"},{k:"post_date",label:"Date"},{k:"status",label:"Status",pill:true}]},
  ceTasks:{ table:"ce_tasks", title:"CE Management", addLabel:"Add Task",
    fields:[
      {k:"task",label:"Task",type:"text",req:true},
      {k:"task_date",label:"Date",type:"date"},
      {k:"status",label:"Status",type:"select",opts:ST.ceTask},
      {k:"notes",label:"Notes",type:"textarea"}
    ],
    cols:[{k:"task",label:"Task"},{k:"task_date",label:"Date"},{k:"status",label:"Status",pill:true},{k:"notes",label:"Notes"}]},
  todos:{ table:"todos", title:"To-Do", addLabel:"Add To-Do",
    fields:[

/* ---------- boot ---------- */
function startApp(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  document.getElementById("uName").textContent=session.name;
  const roleLong = session.role==="admin"?"Administrator":(session.role==="ce"?"Client Executive":"Social Media Manager");
  const roleShort = session.role==="admin"?"Admin":(session.role==="ce"?"CE":"Social");
  document.getElementById("uRole").textContent=roleLong;
  document.getElementById("topUser").textContent=session.name+" \u00B7 "+roleShort;
  buildNav();
  current = session.role==="admin" ? "dashboard" : "attendance";
  show(current);
}
function canAccess(item){ return true; }
function buildNav(){
  let html="", last="";
  NAV.filter(canAccess).forEach(it=>{
    if(it.group!==last){ html+='<div class="nav-sep">'+esc(it.group)+'</div>'; last=it.group; }
    html+='<button class="nav-item" data-key="'+it.key+'" onclick="show(\''+it.key+'\')">'+esc(it.label)+'</button>';
  });
  document.getElementById("nav").innerHTML=html;
}
function setActive(key){ document.querySelectorAll(".nav-item").forEach(b=>b.classList.toggle("active",b.dataset.key===key)); }
function toggleSidebar(open){
  const sb2=document.getElementById("sidebar"), sc=document.getElementById("scrim");
  if(open===undefined) open=!sb2.classList.contains("open");
  sb2.classList.toggle("open",open); sc.classList.toggle("show",open);
}

async function show(key){
  const item=NAV.find(n=>n.key===key);
  if(item && !canAccess(item)) key="attendance";
  current=key; setActive(key); toggleSidebar(false);
  document.getElementById("pageTitle").textContent=(NAV.find(n=>n.key===key)||{}).label||"Workspace";
  const c=document.getElementById("content");
  c.innerHTML="<div class='panel'><div class='empty'>Loading\u2026</div></div>";
  try{
    let html;
    if(key==="dashboard")        html=await viewDashboard();
    else if(key==="attendance")  html=await viewAttendance();
    else if(key==="finances")    html=await viewFinances();
    else if(key==="services")    html=await viewServices();
    else if(key==="personal")    html=await viewPersonal();
    else if(key==="activity")    html=await viewActivity();
    else if(key==="settings")    html=await viewSettings();
    else if(CRUD[key])           html=await viewCRUD(key);
    else html="<div class='panel'><div class='empty'>Module not found.</div></div>";
    if(current===key){ c.innerHTML=html; window.scrollTo(0,0); }
  }catch(e){
    c.innerHTML="<div class='panel'><div class='empty'>Could not load data.<br><span style='color:var(--danger)'>"+esc(e.message||e)+"</span></div></div>";
  }
}

/* ---------- pills ---------- */
function pill(val){
  if(val==null||val==="") return "<span class='pill muted'>&mdash;</span>";
  const v=String(val).toLowerCase(); let cls="";
  if(["completed","approved","published","done","applied","visa approved"].includes(v)) cls="ok";
  else if(["rejected","visa rejected"].includes(v)) cls="danger";
  else if(["pending","scheduled","in progress","submitted","lead","open","draft","on hold","upcoming","visa reapplied"].includes(v)) cls="warn";
  return "<span class='pill "+cls+"'>"+esc(val)+"</span>";
}
function prioPill(val){ const v=String(val||"").toLowerCase(); let cls="muted"; if(v==="high")cls="warn"; if(v==="low")cls="ok"; return "<span class='pill "+cls+"'>"+esc(val||"\u2014")+"</span>"; }

/* ---------- Dashboard ---------- */
async function viewDashboard(){
  const now=new Date();
  const monthStr=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");
  const monthLabel=now.toLocaleString("en-GB",{month:"long",year:"numeric"});
  const [clients,revenue,expenses,activity]=await Promise.all([
    fetchTable("clients"),fetchTable("revenue"),fetchTable("expenses"),fetchTable("activity_log")
  ]);
  const activeClients=clients.filter(c=>String(c.status).toLowerCase()!=="completed").length;
  const outstanding=clients.reduce((s,c)=>s+(Number(c.balance)||0),0);
  const mRev=revenue.filter(r=>String(r.date||"").startsWith(monthStr));
  const mExp=expenses.filter(e=>String(e.date||"").startsWith(monthStr));
  const mRevTotal=mRev.reduce((s,r)=>s+(Number(r.amount)||0),0);
  const mExpTotal=mExp.reduce((s,e)=>s+(Number(e.amount)||0),0);
  const mNet=mRevTotal-mExpTotal;
  const recent=activity.slice(0,10);
  const rows=recent.length?recent.map(a=>"<tr><td style='white-space:nowrap;color:var(--muted)'>"+esc(nowStamp(a.timestamp))+"</td><td>"+esc(a.action)+"</td><td style='color:var(--muted)'>"+esc(a.module)+(a.details?" \u2014 "+esc(a.details):"")+"</td></tr>").join(""):"<tr><td colspan='3' class='empty'>No activity yet.</td></tr>";
  return `
    <div class="stats">
      <div class="stat"><div class="label">Active Clients</div><div class="value">${activeClients}</div></div>
      <div class="stat"><div class="label">${monthLabel} Revenue</div><div class="value gold">${naira(mRevTotal)}</div></div>
      <div class="stat"><div class="label">${monthLabel} Expenses</div><div class="value">${naira(mExpTotal)}</div></div>
      <div class="stat"><div class="label">Outstanding Balance</div><div class="value">${naira(outstanding)}</div></div>
    </div>
    <div class="panel">
      <div class="panel-head"><div><h3>${monthLabel} — Net</h3><div class="panel-sub">Revenue minus expenses this month</div></div>
      <span style="font-size:22px;font-weight:700;color:${mNet>=0?"var(--ok)":"var(--danger)"}">${naira(mNet)}</span></div>
    </div>
    <div class="panel">
      <div class="panel-head"><div><h3>Recent Activity</h3><div class="panel-sub">Live log</div></div></div>
      <div class="table-wrap"><table><thead><tr><th>When</th><th>Action</th><th>Details</th></tr></thead><tbody>${rows}</tbody></table></div>
    </div>`;
}

async function signIn(){
  const t=new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
  const {error}=await sb.from("attendance").insert({name:session.name,date:todayISO(),time_in:t});
  if(error){ toast("Error: "+error.message); return; }
  await logActivity("add","attendance",session.name+" signed in");
  toast("Signed in"); show("attendance");
}

/* ---------- generic CRUD ---------- */
function sectionTable(cfgKey, data, opts){
  opts=opts||{};
  const cfg=CRUD[cfgKey];
  const ro=!!opts.readOnly;
  const head=cfg.cols.map(c=>"<th>"+esc(c.label)+"</th>").join("")+(ro?"":"<th style='text-align:right'>Actions</th>");
  const cell=(c,it)=>{
    let v=it[c.k];
    if(c.money) return "<td>"+naira(v)+"</td>";
    if(c.pill) return "<td>"+pill(v)+"</td>";
    if(c.prio) return "<td>"+prioPill(v)+"</td>";
    if(c.map)  return "<td>"+esc(c.map[v]||v||"\u2014")+"</td>";
    if(c.link) return "<td>"+(v?"<a href='"+esc(v)+"' target='_blank' rel='noopener'>Open</a>":"<span style='color:var(--muted)'>&mdash;</span>")+"</td>";
    return "<td>"+(v?esc(v):"<span style='color:var(--muted)'>&mdash;</span>")+"</td>";
  };
  const rowHtml=(it)=>{
    const tds=cfg.cols.map(c=>cell(c,it)).join("");
    const act = ro?"":"<td><div class='row-actions'>"+
      "<button class='icon-btn' onclick=\"openForm('"+cfgKey+"','"+it.id+"')\">Edit</button>"+
      "<button class='icon-btn del' onclick=\"removeItem('"+cfg.table+"','"+it.id+"','"+(opts.parent||cfgKey)+"')\">Delete</button>"+
      "</div></td>";
    return "<tr>"+tds+act+"</tr>";
  };
  const span=cfg.cols.length+(ro?0:1);
  const body=data.length?data.map(rowHtml).join(""):"<tr><td colspan='"+span+"' class='empty'>"+esc(opts.emptyMsg||"Nothing here yet.")+"</td></tr>";
  return "<div class='table-wrap'><table><thead><tr>"+head+"</tr></thead><tbody>"+body+"</tbody></table></div>";
}
function addBar(addKey, addLabel){
  return `<div style="text-align:right;margin-bottom:8px"><button class="btn" onclick="openForm('${addKey}',null)">${esc(addLabel)}</button></div>`;
}

async function viewCRUD(key){
  // ----- Combined page: CE Management -----
  if(key==="ceTasks"){
    const admin = session.role==="admin";
    const [duties, tasks, comps] = await Promise.all([
      fetchTable("weekly_duties"), fetchTable("ce_tasks"), fetchTable("competitor_watch")]);
    let html=`<div class="panel"><div class="panel-head"><div><h3>CE Management</h3></div></div>`;
    html+=`<div class="section-label">Fixed Weekly Duties${admin?"":" \u00B7 view only"}</div>`;
    if(admin) html+=addBar("weeklyDuties","Add Duty");
    html+=sectionTable("weeklyDuties", duties, {readOnly:!admin, parent:"ceTasks",
      emptyMsg: admin?"No weekly duties yet. Use Add Duty.":"No weekly duties set yet."});
    html+=`<div class="section-label" style="margin-top:24px">Daily Checklist</div>`;
    html+=addBar("ceTasks","Add Task");
    html+=sectionTable("ceTasks", tasks, {parent:"ceTasks", emptyMsg:"No checklist items yet. Use Add Task."});
    html+=`<div class="section-label" style="margin-top:24px">Competitor Watch</div>`;
    html+=addBar("competitors","Add Competitor");
    html+=sectionTable("competitors", comps, {parent:"ceTasks", emptyMsg:"No competitor entries yet. Use Add Competitor."});
    return html+`</div>`;
  }

  // ----- Combined page: Social Media -----
  if(key==="social"){
    const [posts, perf] = await Promise.all([fetchTable("social_media"), fetchTable("social_performance")]);
    let html=`<div class="panel"><div class="panel-head"><div><h3>Social Media</h3></div></div>`;
    html+=`<div class="section-label">Posts</div>`;
    html+=addBar("social","Add Post");
    html+=sectionTable("social", posts, {parent:"social", emptyMsg:"No posts yet. Use Add Post."});
    html+=`<div class="section-label" style="margin-top:24px">Monthly Performance</div>`;
    html+=addBar("socialPerf","Add Month");
    html+=sectionTable("socialPerf", perf, {parent:"social", emptyMsg:"No monthly performance recorded yet. Use Add Month."});
    return html+`</div>`;
  }

  const cfg=CRUD[key];
  const data=await fetchTable(cfg.table);
  const headHtml=`<div class="panel-head"><div><h3>${esc(cfg.title)}</h3></div>
    <button class="btn" onclick="openForm('${key}',null)">${esc(cfg.addLabel)}</button></div>`;

  // ----- Clients: Active / Completed split -----
  if(key==="clients"){
    const isCompleted=(c)=>String(c.status||"").toLowerCase()==="completed";
    const isRejected=(c)=>String(c.status||"").toLowerCase()==="visa rejected";
    const active=data.filter(c=>!isCompleted(c)&&!isRejected(c));
    const rejected=data.filter(isRejected);
    const done=data.filter(isCompleted);
    return `<div class="panel">${headHtml}
      <div class="section-label">Active Clients (${active.length})</div>
      ${sectionTable(key,active,{parent:key,emptyMsg:"No active clients. Use \u201CAdd Client\u201D to begin."})}
      <div class="section-label" style="margin-top:24px;border-left-color:var(--danger);color:var(--danger)">Visa Rejected \u2014 No Reapplication (${rejected.length})</div>
      ${sectionTable(key,rejected,{parent:key,emptyMsg:"No rejected cases without reapplication."})}
      <div class="section-label" style="margin-top:24px;border-left-color:var(--ok);color:var(--ok)">Completed (${done.length})</div>
      ${sectionTable(key,done,{parent:key,emptyMsg:"No completed clients yet."})}</div>`;
  }

  // ----- Webinars: Upcoming / Past split -----
  if(key==="webinars"){
    const today=todayISO();
    const upcoming=data.filter(w=>String(w.event_date||"")>=today);
    const past=data.filter(w=>String(w.event_date||"")<today);
    return `<div class="panel">
      <div class="panel-head"><div><h3>Webinars</h3></div><button class="btn" onclick="openForm('webinars',null)">Add Webinar</button></div>
      <div class="section-label">Upcoming (${upcoming.length})</div>
      ${sectionTable("webinars",upcoming,{parent:"webinars",emptyMsg:"No upcoming webinars. Use Add Webinar."})}
      <div class="section-label" style="margin-top:24px">Past (${past.length})</div>
      ${sectionTable("webinars",past,{parent:"webinars",emptyMsg:"No past webinars yet."})}</div>`;
  }
}

async function exportReport(id){
  const {data:r}=await sb.from("ce_reports").select("*").eq("id",id).single();
  if(!r) return;
  const leads=Number(r.total_leads)||0, conv=Number(r.converted_leads)||0, rate=leads?Math.round(conv/leads*100):0;
  const text="EDUVOYAGE \u2014 CE WEEKLY REPORT\nWeek: "+(r.week||"-")+
    "\nTotal Leads: "+leads+
    "\nLeads Followed Up: "+(Number(r.leads_followed_up)||0)+
    "\nConverted Leads: "+conv+
    "\nPending / In Conversation: "+(Number(r.pending_leads)||0)+
    "\nLost / No Response: "+(Number(r.lost_leads)||0)+
    "\nConversion Rate: "+rate+"%"+
    "\n\nClient Responses / Objections:\n"+(r.client_responses||"-")+
    "\n\nCE's Opinion / Thoughts on Leads:\n"+(r.ce_opinion||"-")+
    "\n\nFeedback / Notes:\n"+(r.feedback||"-")+
    "\n\nPrepared by: "+session.name+"\nGenerated: "+nowStamp();
  copyText(text);
}
function copyText(text){
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(()=>toast("Copied to clipboard")).catch(()=>fallbackCopy(text)); }
  else fallbackCopy(text);
}
function fallbackCopy(text){ const ta=document.createElement("textarea"); ta.value=text; document.body.appendChild(ta); ta.select(); try{document.execCommand("copy");toast("Copied to clipboard");}catch(e){alert(text);} document.body.removeChild(ta); }

async function viewFinances(){
  const now=new Date();
  const monthStr=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");
  const monthLabel=now.toLocaleString("en-GB",{month:"long",year:"numeric"});
  const [revenue,expenses,clients]=await Promise.all([fetchTable("revenue"),fetchTable("expenses"),fetchTable("clients")]);
  const outstanding=clients.reduce((s,c)=>s+(Number(c.balance)||0),0);

  // Per-stream helpers
  function streamStats(stream, month){
    const rows=revenue.filter(r=>String(r.stream||"")===stream&&(month?String(r.date||"").startsWith(month):true));
    const rev=rows.reduce((s,r)=>s+(Number(r.amount)||0),0);
    const cost=rows.reduce((s,r)=>s+(Number(r.cost)||0),0);
    return {rev,cost,profit:rev-cost};
  }
  const SA=streamStats("Study Abroad",monthStr);
  const TT=streamStats("Travel & Tours",monthStr);
  const FL=streamStats("Flights",monthStr);
  const mExp=expenses.filter(e=>String(e.date||"").startsWith(monthStr)).reduce((s,e)=>s+(Number(e.amount)||0),0);

  // Monthly breakdown per stream
  const months={};
  revenue.forEach(r=>{
    const m=String(r.date||"").slice(0,7); const st=String(r.stream||"Other");
    if(!m) return;
    if(!months[m]) months[m]={};
    if(!months[m][st]) months[m][st]={rev:0,cost:0};
    months[m][st].rev+=Number(r.amount)||0; months[m][st].cost+=Number(r.cost)||0;
  });
  expenses.forEach(e=>{
    const m=String(e.date||"").slice(0,7);
    if(!m) return;
    if(!months[m]) months[m]={};
    if(!months[m]["_exp"]) months[m]["_exp"]={rev:0,cost:0};
    months[m]["_exp"].rev+=Number(e.amount)||0;
  });
  const sortedMonths=Object.keys(months).sort().reverse();
  const breakdownRows=sortedMonths.length?sortedMonths.map(m=>{
    const d=months[m];
    const sa=(d["Study Abroad"]||{rev:0,cost:0}); const tt=(d["Travel & Tours"]||{rev:0,cost:0}); const fl=(d["Flights"]||{rev:0,cost:0});
    const exp=(d["_exp"]||{rev:0}).rev;
    const label=new Date(m+"-01").toLocaleString("en-GB",{month:"long",year:"numeric"});
    const totalProfit=(sa.rev-sa.cost)+(tt.rev-tt.cost)+(fl.rev-fl.cost)-exp;
    return "<tr><td style='font-weight:600'>"+esc(label)+"</td>"+
      "<td style='color:var(--gold-soft)'>"+naira(sa.rev)+"</td>"+
      "<td>"+naira(tt.rev)+" / <span style='color:var(--danger)'>"+naira(tt.cost)+"</span> = <b>"+naira(tt.rev-tt.cost)+"</b></td>"+
      "<td>"+naira(fl.rev)+" / <span style='color:var(--danger)'>"+naira(fl.cost)+"</span> = <b>"+naira(fl.rev-fl.cost)+"</b></td>"+
      "<td style='color:var(--muted)'>"+naira(exp)+"</td>"+
      "<td style='font-weight:700;color:"+(totalProfit>=0?"var(--ok)":"var(--danger)")+"'>"+naira(totalProfit)+"</td></tr>";
  }).join(""):"<tr><td colspan='6' class='empty'>No data yet.</td></tr>";

  const expRows=expenses.length?expenses.map(e=>"<tr><td>"+esc(e.date||"")+"</td><td>"+esc(e.category||"")+"</td><td>"+esc(e.description||"")+"</td><td>"+naira(e.amount)+"</td><td><div class='row-actions'><button class='icon-btn' onclick=\"openForm('expenses','"+e.id+"')\">Edit</button><button class='icon-btn del' onclick=\"removeItem('expenses','"+e.id+"','finances')\">Delete</button></div></td></tr>").join(""):"<tr><td colspan='5' class='empty'>No expenses recorded.</td></tr>";

  return `
    <div class="section-label">${monthLabel} — This Month</div>
    <div class="stats" style="grid-template-columns:repeat(4,1fr)">
      <div class="stat"><div class="label">Study Abroad</div><div class="value gold">${naira(SA.rev)}</div><div style="font-size:11px;color:var(--muted);margin-top:4px">Processing fees</div></div>
      <div class="stat"><div class="label">Travel & Tours</div><div class="value gold">${naira(TT.rev)}</div><div style="font-size:11px;color:var(--muted);margin-top:4px">Cost ${naira(TT.cost)} &bull; Profit <b style="color:var(--ok)">${naira(TT.profit)}</b></div></div>
      <div class="stat"><div class="label">Flights</div><div class="value gold">${naira(FL.rev)}</div><div style="font-size:11px;color:var(--muted);margin-top:4px">Cost ${naira(FL.cost)} &bull; Profit <b style="color:var(--ok)">${naira(FL.profit)}</b></div></div>
      <div class="stat"><div class="label">Outstanding (Clients)</div><div class="value">${naira(outstanding)}</div></div>
    </div>

    <div class="section-label" style="margin-top:8px">Monthly Breakdown</div>
    <div class="panel" style="margin-bottom:20px">
      <div class="table-wrap"><table><thead><tr><th>Month</th><th>Study Abroad</th><th>Travel &amp; Tours</th><th>Flights</th><th>Expenses</th><th>Net Profit</th></tr></thead>
      <tbody>${breakdownRows}</tbody></table></div>
    </div>

    <div class="panel"><div class="panel-head"><div><h3>Eduvoyage Ltd — Study Abroad</h3><div class="panel-sub">Processing fees &amp; school applications</div></div><button class="btn" onclick="openForm('revenueStudy',null)">Add Income</button></div>
      <div class="table-wrap"><table><thead><tr><th>Date</th><th>Client</th><th>Service</th><th>Amount Received</th><th colspan="2"></th><th style="text-align:right">Actions</th></tr></thead>
      <tbody>${streamRows(revenue,"Study Abroad","revenueStudy")}</tbody></table></div></div>

    <div class="panel"><div class="panel-head"><div><h3>Eduvoyage Travel &amp; Tours</h3><div class="panel-sub">Holiday packages &amp; tours</div></div><button class="btn" onclick="openForm('revenueTours',null)">Add Package</button></div>
      <div class="table-wrap"><table><thead><tr><th>Date</th><th>Client</th><th>Package</th><th>Charged</th><th>Spent</th><th>Profit</th><th style="text-align:right">Actions</th></tr></thead>
      <tbody>${streamRows(revenue,"Travel & Tours","revenueTours")}</tbody></table></div></div>

    <div class="panel"><div class="panel-head"><div><h3>Flight Bookings</h3><div class="panel-sub">Ticket revenue &amp; profit</div></div><button class="btn" onclick="openForm('revenueFlights',null)">Add Flight</button></div>
      <div class="table-wrap"><table><thead><tr><th>Date</th><th>Client</th><th>Route</th><th>Charged</th><th>Ticket Cost</th><th>Profit</th><th style="text-align:right">Actions</th></tr></thead>
      <tbody>${streamRows(revenue,"Flights","revenueFlights")}</tbody></table></div></div>

    <div class="panel"><div class="panel-head"><div><h3>Business Expenses</h3><div class="panel-sub">Running costs &amp; overheads</div></div><button class="btn" onclick="openForm('expenses',null)">Add Expense</button></div>

      <tbody>${expRows}</tbody></table></div></div>`;
}

      f.opts.forEach(o=>{ const ov=typeof o==="object"?o.value:o, ol=typeof o==="object"?o.label:o; html+="<option value='"+esc(ov)+"'"+(String(val)===String(ov)?" selected":"")+">"+esc(ol)+"</option>"; });
      html+="</select>";
    } else if(f.type==="textarea"){ html+="<textarea id='f_"+f.k+"' rows='3'>"+esc(val)+"</textarea>"; }
    else { html+="<input id='f_"+f.k+"' type='"+f.type+"' value='"+esc(val)+"'>"; }

  });
  document.getElementById("modalTitle").textContent=(id?"Edit ":"Add ")+titles[streamKey];

}

async function changePassword(){
  const p1=document.getElementById("pw1").value, p2=document.getElementById("pw2").value;
  const msg=document.getElementById("pwMsg");
  if(!p1||p1.length<6){ msg.style.color="var(--danger)"; msg.textContent="Password must be at least 6 characters."; return; }
  if(p1!==p2){ msg.style.color="var(--danger)"; msg.textContent="The two passwords do not match."; return; }
  msg.style.color="var(--muted)"; msg.textContent="Updating\u2026";
  try{
    const {error}=await sb.auth.updateUser({password:p1});
    if(error){ msg.style.color="var(--danger)"; msg.textContent="Error: "+error.message; return; }
    await logActivity("change password","auth",session.name+" updated their password");
    msg.style.color="var(--ok)"; msg.textContent="Password updated. Use it next time you sign in.";
    document.getElementById("pw1").value=""; document.getElementById("pw2").value="";
    toast("Password updated");
  }catch(e){ msg.style.color="var(--danger)"; msg.textContent="Error: "+e.message; }
}

function copyToClip(text){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>toast("Copied to clipboard")).catch(()=>fallbackCopy(text));
  } else { fallbackCopy(text); }
}
function fallbackCopy(text){
  const el=document.createElement("textarea"); el.value=text;
  el.style.position="fixed"; el.style.opacity="0";
  document.body.appendChild(el); el.select();
  try{ document.execCommand("copy"); toast("Copied"); }catch(e){ toast("Long-press to copy manually"); }
  document.body.removeChild(el);
}
function moduleLabel(key){ return CRUD[key]?CRUD[key].title:({revenue:"Revenue",expenses:"Expense",personal_eduvoyage:"Note",personal_waka:"WakaWithAmi"}[key]||key); }
function labelOf(obj){ return obj.client_name||obj.title||obj.task||obj.duty||obj.competitor||obj.month||obj.client||obj.week||obj.country||obj.note||obj.content||obj.topic||obj.service_name||"record"; }

async function openForm(key,id){
  const fields=fieldDefs(key), table=tableFor(key);
  let existing=null;
  if(id){ const {data}=await sb.from(table).select("*").eq("id",id).single(); existing=data; }
  modalCtx={key,table,id:id||null,parentView:parentViewFor(key)};
  document.getElementById("modalTitle").textContent=(id?"Edit ":"Add ")+(CRUD[key]?CRUD[key].title.replace(/s$/,""):moduleLabel(key));
  let html="";
  let autoInvoice="";
  if(key==="clients" && !id){
    try{
      const ex=await fetchTable("clients"); let max=0;
      ex.forEach(c=>{ const n=parseInt(String(c.invoice_no||"").replace(/[^0-9]/g,""),10); if(!isNaN(n)&&n>max) max=n; });
      autoInvoice="#"+String(max+1).padStart(3,"0");
    }catch(e){ autoInvoice=""; }
  }
  fields.forEach(f=>{
    let val = existing ? (existing[f.k]==null?"":existing[f.k]) : (f.k==="invoice_no"?autoInvoice : (f.type==="date"?todayISO():""));
    html+="<div class='field'><label>"+esc(f.label)+(f.req?" *":"")+"</label>";
    if(f.type==="select"){
      html+="<select id='f_"+f.k+"'>";
      f.opts.forEach(o=>{ const ov=typeof o==="object"?o.value:o, ol=typeof o==="object"?o.label:o; html+="<option value='"+esc(ov)+"'"+(String(val)===String(ov)?" selected":"")+">"+esc(ol)+"</option>"; });
      html+="</select>";
    } else if(f.type==="textarea"){ html+="<textarea id='f_"+f.k+"' rows='3'>"+esc(val)+"</textarea>"; }
    else { html+="<input id='f_"+f.k+"' type='"+f.type+"' value='"+esc(val)+"'>"; }
    html+="</div>";
  });
  document.getElementById("modalBody").innerHTML=html;
  document.getElementById("modalSave").onclick=saveForm;
  document.getElementById("overlay").classList.add("show");
}
function closeModal(){ document.getElementById("overlay").classList.remove("show"); modalCtx=null; }

async function saveForm(){
  const {key,table,id,parentView}=modalCtx;
  const fields=fieldDefs(key), obj={};
  for(const f of fields){
    const el=document.getElementById("f_"+f.k); let v=el.value.trim();
    if(f.req&&!v){ el.focus(); el.style.borderColor="var(--danger)"; return; }
    if(f.type==="number") v = v===""?null:Number(v);
    if((f.type==="date"||f.type==="time")&&v==="") v=null;
    obj[f.k]=v;
  }
  // Auto-inject stream for finance stream forms
  if(modalCtx.stream) obj.stream=modalCtx.stream;
  if(key==="revenueStudy") obj.stream="Study Abroad";
  else if(key==="revenueTours") obj.stream="Travel & Tours";
  else if(key==="revenueFlights") obj.stream="Flights";
  if(key==="serviceStudy") obj.type="Study Abroad";
  else if(key==="serviceTours") obj.type="Travel & Tours";
  if(!id && HAS_CREATED_BY.has(table)) obj.created_by=session.role;
  if(id && HAS_UPDATED_AT.has(table)) obj.updated_at=new Date().toISOString();
  const saveBtn=document.getElementById("modalSave"); saveBtn.disabled=true;
  let res, recId=id;
  if(id) res=await sb.from(table).update(obj).eq("id",id);
  else { res=await sb.from(table).insert(obj).select(); if(res.data&&res.data[0]) recId=res.data[0].id; }
  saveBtn.disabled=false;
  if(res.error){ toast("Error: "+res.error.message); return; }
  await logActivity(id?"edit":"add", moduleLabel(key), labelOf(obj), recId);
  toast(id?"Updated":"Added"); closeModal(); show(parentView);
}

async function removeItem(table,id,parentView){
  if(!confirm("Delete this record? This cannot be undone.")) return;
  const {error}=await sb.from(table).delete().eq("id",id);
  if(error){ toast("Error: "+error.message); return; }
  await logActivity("delete", table, "", id);
  toast("Deleted"); show(parentView);
}

/* ---------- data management ---------- */
async function downloadBackup(){
  toast("Preparing backup\u2026");
  const out={};
  for(const t of ALL_TABLES){ try{ out[t]=await fetchTable(t); }catch(e){ out[t]=[]; } }
  const blob=new Blob([JSON.stringify(out,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob); const a=document.createElement("a");
  a.href=url; a.download="eduvoyage-backup-"+todayISO()+".json"; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  toast("Backup downloaded");
}
function csvCell(v){ return '"'+String(v==null?"":v).replace(/"/g,'""')+'"'; }
async function exportCSV(){
  toast("Preparing CSV\u2026");
  const blocks={
    CLIENTS:["invoice_no","client_name","phone","service","country","status","last_followup","balance","google_drive_link"],
    ATTENDANCE:["name","date","time_in"],
    "SOCIAL MEDIA":["brand","platform","content_type","topic","post_date","status"],
    "CE MANAGEMENT":["task","task_date","status","notes"],
    "MY TO-DOS":["task","priority","status","due_date"],
    "CE REPORTS":["week","total_leads","leads_followed_up","converted_leads","pending_leads","lost_leads","client_responses","ce_opinion","feedback"],
    WEBINARS:["title","speaker","event_date","event_time","status","description"],
    SERVICES:["service_name","description","price"],
    SCHOLARSHIPS:["country","destination","deadline","status"],
    REVENUE:["date","client","service","amount"],
    EXPENSES:["date","category","description","amount"]
  };
  const map={CLIENTS:"clients",ATTENDANCE:"attendance","SOCIAL MEDIA":"social_media","CE MANAGEMENT":"ce_tasks","MY TO-DOS":"todos","CE REPORTS":"ce_reports",WEBINARS:"webinars",SERVICES:"services",SCHOLARSHIPS:"scholarships",REVENUE:"revenue",EXPENSES:"expenses"};
  let outStr="";
  for(const title in blocks){
    let data=[]; try{ data=await fetchTable(map[title]); }catch(e){}
    outStr+=title+"\n"+blocks[title].map(csvCell).join(",")+"\n";
    data.forEach(r=>{ outStr+=blocks[title].map(k=>csvCell(r[k])).join(",")+"\n"; });
    outStr+="\n";
  }
  const blob=new Blob([outStr],{type:"text/csv"}); const url=URL.createObjectURL(blob); const a=document.createElement("a");
  a.href=url; a.download="eduvoyage-export-"+todayISO()+".csv"; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  await logActivity("export","settings","Exported all data to CSV"); toast("CSV exported");
}
async function clearAll(){
  if(!confirm("This permanently deletes ALL workspace data from the cloud (clients, finances, social, etc.). Attendance and the activity log are immutable and will remain. Continue?")) return;
  if(!confirm("Are you absolutely sure? Download a backup first if unsure.")) return;
  const clearable=ALL_TABLES.filter(t=>t!=="attendance"&&t!=="activity_log");
  for(const t of clearable){ try{ await sb.from(t).delete().not("id","is",null); }catch(e){} }
  await logActivity("clear","settings","All data cleared"); toast("All data cleared"); show("settings");
}

function showSetup(){
  document.getElementById("loginForm").innerHTML=
    '<div class="setup-box"><strong>Setup needed.</strong><br>Open this file and paste your Supabase credentials near the top of the script:<br><br>'+
    '&bull; <code>SUPABASE_URL</code><br>&bull; <code>SUPABASE_ANON_KEY</code><br><br>'+
    'Then create two users in Supabase Authentication:<br>&bull; <code>'+esc(ADMIN_EMAIL)+'</code> (admin)<br>&bull; <code>'+esc(CE_EMAIL)+'</code> (ce)<br><br>Reload the page after saving.</div>';
}
async function init(){
  if(!configured()){ showSetup(); return; }
  if(typeof supabase==="undefined"){ document.getElementById("loginErr").textContent="Could not load Supabase library (check your internet connection)."; return; }
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  try{
    const { data:{ session:s } } = await sb.auth.getSession();
    if(s && s.user){ session=roleFromEmail(s.user.email); subscribeRealtime(); startApp(); }
  }catch(e){ /* fall through to login */ }
}
init();
